input LoginInput {
  email: String!
  password: String!
}

input RegisterUserInput {
  email: String!
  password: String!
}

type AuthPayload {
  token: String!
  user: User!
}

extend type Mutation {
  login(input: LoginInput!): AuthPayload!
  registerUser(input: RegisterUserInput!): AuthPayload!
  logout: Boolean!
}
