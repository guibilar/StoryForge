input AddCampaignMemberInput {
  campaignId: ID!
  email: String!
  role: CampaignRole!
}

input UpdateCampaignMemberRoleInput {
  campaignId: ID!
  userId: ID!
  role: CampaignRole!
}

extend type Mutation {
  addCampaignMember(input: AddCampaignMemberInput!): CampaignMember!
  removeCampaignMember(campaignId: ID!, userId: ID!): Boolean!
  updateCampaignMemberRole(
    input: UpdateCampaignMemberRoleInput!
  ): CampaignMember!
  """
  Hands OWNER over to another existing campaign member, atomically demoting
  the current OWNER to STORYTELLER. Only the current OWNER may call this.
  """
  transferCampaignOwnership(campaignId: ID!, userId: ID!): CampaignMember!
}
