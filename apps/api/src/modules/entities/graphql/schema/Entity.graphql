enum EntityVisibility {
  PUBLIC
  STORYTELLER
  PRIVATE
}

enum EntityCategory {
  CHARACTER
  LOCATION
  ORGANIZATION
  ITEM
  OTHER
}

type Entity {
  id: ID!
  campaignId: ID!
  type: String!
  category: EntityCategory!
  name: String!
  description: String
  icon: String
  image: String
  visibility: EntityVisibility!
  isPlayerCharacter: Boolean!
  createdAt: String!
  updatedAt: String!
  deletedAt: String
  tags: [Tag!]!
}
