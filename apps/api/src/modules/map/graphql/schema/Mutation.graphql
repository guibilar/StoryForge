input CreateMarkerInput {
  campaignId: ID!
  entityId: ID
  name: String!
  lat: Float!
  lng: Float!
  description: String
}

input UpdateMarkerInput {
  id: ID!
  # Pass null to unlink; omit to leave the existing link untouched.
  entityId: ID
  name: String
  lat: Float
  lng: Float
  description: String
}

input CreateTerritoryInput {
  campaignId: ID!
  entityId: ID
  name: String!
  type: String!
  geometry: String!
  description: String
}

input UpdateTerritoryInput {
  id: ID!
  # Pass null to unlink; omit to leave the existing link untouched.
  entityId: ID
  name: String
  type: String
  geometry: String
  description: String
}

extend type Mutation {
  createMarker(input: CreateMarkerInput!): Marker!
  updateMarker(input: UpdateMarkerInput!): Marker!
  deleteMarker(id: ID!): Boolean!
  createTerritory(input: CreateTerritoryInput!): Territory!
  updateTerritory(input: UpdateTerritoryInput!): Territory!
  deleteTerritory(id: ID!): Boolean!
  uploadMapImage(campaignId: ID!, file: Upload!): MapImage!
  deleteMapImage(campaignId: ID!): Boolean!
  """
  Storyteller-only (KAN-128's BROADCAST_TO_PLAYERS). Pushes the caller's
  current map center/zoom to the targeted player(s) via the
  `forceSyncViewport` subscription (KAN-129). Persists nothing — this is a
  transient live-view nudge, not a saved map state.
  """
  forceSyncViewport(input: ForceSyncViewportInput!): Boolean!
}
