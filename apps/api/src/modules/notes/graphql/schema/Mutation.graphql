input CreateNoteInput {
  campaignId: ID!
  title: String!
  content: String
  parentNoteId: ID
}

input UpdateNoteInput {
  id: ID!
  title: String
  content: String
}

extend type Mutation {
  createNote(input: CreateNoteInput!): Note!
  updateNote(input: UpdateNoteInput!): Note!
  deleteNote(id: ID!): Boolean!
  moveNote(id: ID!, parentNoteId: ID): Note!
}
