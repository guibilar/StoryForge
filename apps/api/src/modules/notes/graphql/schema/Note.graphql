enum NoteVisibility {
  SHARED
  PRIVATE
  TARGETED
}

type Note {
  id: ID!
  campaignId: ID!
  authorId: ID!
  title: String!
  content: String!
  parentNoteId: ID
  parent: Note
  children: [Note!]!
  visibility: NoteVisibility!
  recipientIds: [ID!]!
  createdAt: String!
  updatedAt: String!
  deletedAt: String
}
