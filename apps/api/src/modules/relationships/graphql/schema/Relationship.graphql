enum RelationshipVisibility {
  """Everyone who can see both endpoint entities."""
  PUBLIC
  """The Storyteller side only, however public the endpoints are."""
  STORYTELLER
  """The Storyteller side plus the players named in recipientIds."""
  TARGETED
}

enum RelationshipEndpoint {
  SOURCE
  TARGET
}

type Relationship {
  id: ID!
  campaignId: ID!
  """Null for a non-Storyteller viewer when this side is concealedEndpoint."""
  sourceEntityId: ID
  """Null for a non-Storyteller viewer when this side is concealedEndpoint."""
  targetEntityId: ID
  type: String!
  description: String
  visibility: RelationshipVisibility!
  """Which side's identity is hidden from non-Storyteller viewers, if any."""
  concealedEndpoint: RelationshipEndpoint
  recipientIds: [ID!]!
  createdAt: String!
  updatedAt: String!
  deletedAt: String
}
