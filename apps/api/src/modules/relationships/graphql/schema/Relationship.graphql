enum RelationshipVisibility {
  """Everyone who can see both endpoint entities."""
  PUBLIC
  """The Storyteller side only, however public the endpoints are."""
  STORYTELLER
  """The Storyteller side plus the players named in recipientIds."""
  TARGETED
}

type Relationship {
  id: ID!
  campaignId: ID!
  sourceEntityId: ID!
  targetEntityId: ID!
  type: String!
  description: String
  visibility: RelationshipVisibility!
  recipientIds: [ID!]!
  createdAt: String!
  updatedAt: String!
  deletedAt: String
}
