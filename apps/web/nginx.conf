# Proxies GraphQL/upload requests to the "api" service (see docker-compose.yml)
# and serves the React SPA for everything else, falling back to index.html
# for client-side routing.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /graphql {
        proxy_pass http://api:4000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri /index.html;
    }
}
