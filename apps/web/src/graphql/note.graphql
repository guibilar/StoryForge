query Note($id: ID!) {
  note(id: $id) {
    id
    campaignId
    authorId
    title
    content
    visibility
    recipientIds
    createdAt
    updatedAt
    linkedEntities {
      id
      name
      type
      category
      description
      image
      color
      visibility
    }
    linkedNotes {
      id
      title
    }
    children {
      id
      authorId
      title
      content
      visibility
    }
    backlinks {
      id
      title
    }
    attachments {
      id
      url
      fileName
      mimeType
      sizeBytes
      createdAt
    }
  }
}
