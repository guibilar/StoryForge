query Notes($campaignId: ID!) {
  noteRoots(campaignId: $campaignId) {
    id
    campaignId
    authorId
    title
    content
    visibility
    recipientIds
    createdAt
    updatedAt
    linkedEntities {
      id
      name
      type
      category
      description
      image
      color
      visibility
    }
    linkedNotes {
      id
      title
    }
    backlinks {
      id
      title
    }
  }
}
